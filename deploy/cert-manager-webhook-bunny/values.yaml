# groupName is the API group used by cert-manager to find this webhook solver.
groupName: bunny.aardbol.dev

replicaCount: 1

certManager:
  # certManager.namespace is the namespace where cert-manager runs.
  namespace: cert-manager
  # certManager.serviceAccountName is the service account used by cert-manager.
  serviceAccountName: cert-manager

image:
  repository: ghcr.io/aardbol/cert-manager-webhook-bunny
  tag: "1.1.0"
  # image.hash can be used instead of image.tag to pin by digest.
  hash: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 443

secretAccess:
  # secretAccess.namespace is the namespace where Bunny API secrets are allowed to be read from.
  # Keep this equal to the release namespace unless you intentionally want cross-namespace Secret access.
  namespace: cert-manager
  # secretAccess.names is the list of Secret names the webhook may read.
  # Leave empty to allow reading any Secret in secretAccess.namespace.
  names: []

resources: {}
# We usually recommend not to specify default resources and to leave this as a conscious
# choice for the user. This also increases chances charts run on environments with little
# resources, such as Minikube. If you do want to specify resources, uncomment the following
# lines, adjust them as necessary, and remove the curly braces after 'resources:'.
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 50m
#   memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}
