name: Release OCI Artifacts

on:
  push:
    branches:
      - main
    paths:
      - deploy/cert-manager-webhook-bunny/Chart.yaml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CHART_DIR: deploy/cert-manager-webhook-bunny

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check version bump and image existence
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          chart_version=$(yq '.version' ${{ env.CHART_DIR }}/Chart.yaml)
          app_version=$(yq '.appVersion' ${{ env.CHART_DIR }}/Chart.yaml)
          
          echo "chart_version=$chart_version" >> "$GITHUB_OUTPUT"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          
          if gh release view "v$chart_version" > /dev/null 2>&1; then
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          latest_release=$(gh release list --limit 1 | awk '{print $1}' | sed 's/^v//')
          if [ -z "$latest_release" ]; then
            latest_release="0.0.0"
          fi
          
          highest_version=$(printf '%s\n' "$latest_release" "$chart_version" | sort -V | tail -n1)
          
          if [ "$highest_version" != "$chart_version" ]; then
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          image_exists="false"
          if oras manifest fetch ghcr.io/${{ env.IMAGE_NAME }}:$app_version > /dev/null 2>&1; then
            echo "Image $app_version already exists in GHCR. Skipping build."
            image_exists="true"
          fi
          
          is_prerelease="false"
          if [[ "$chart_version" == *-* ]]; then
            is_prerelease="true"
          fi
          
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"
          echo "skip_release=false" >> "$GITHUB_OUTPUT"
          echo "image_exists=$image_exists" >> "$GITHUB_OUTPUT"

      # --- IMAGE BUILD & PUSH (Skipped if image already exists) ---

      - name: Build image
        if: steps.check.outputs.skip_release == 'false' && steps.check.outputs.image_exists == 'false'
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: |
            ${{ steps.check.outputs.app_version }}
            ${{ steps.check.outputs.is_prerelease == 'false' && 'latest' || '' }}
          containerfiles: ./Containerfile
          platforms: linux/amd64,linux/arm64
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ env.IMAGE_NAME }}
            org.opencontainers.image.version=${{ steps.check.outputs.app_version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Log in to GHCR for Container Push
        if: steps.check.outputs.skip_release == 'false' && steps.check.outputs.image_exists == 'false'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: steps.check.outputs.skip_release == 'false' && steps.check.outputs.image_exists == 'false'
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ${{ env.REGISTRY }}

      # --- HELM CHART PACKAGE & PUSH (Always runs if chart version is bumped) ---

      - name: Log in to Helm OCI registry
        if: steps.check.outputs.skip_release == 'false'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin

      - name: Package chart
        if: steps.check.outputs.skip_release == 'false'
        run: |
          mkdir -p dist
          helm package ${{ env.CHART_DIR }} --destination dist

      - name: Push Artifact Hub metadata
        if: steps.check.outputs.skip_release == 'false'
        run: |
          oras login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          oras push ghcr.io/${{ github.repository_owner }}/charts/cert-manager-webhook-bunny:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

      - name: Push chart to GHCR OCI
        if: steps.check.outputs.skip_release == 'false'
        run: helm push dist/*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Create GitHub release
        if: steps.check.outputs.skip_release == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.check.outputs.chart_version }}" \
            dist/*.tgz \
            --generate-notes \
            --title "v${{ steps.check.outputs.chart_version }}" \
            ${{ steps.check.outputs.is_prerelease == 'true' && '--prerelease' || '' }}