name: PR Validate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Go tests
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_ZONE_ID: ${{ secrets.BUNNY_ZONE_ID }}
          BUNNY_TEST_FQDN: ${{ secrets.BUNNY_TEST_FQDN }}
        run: make test

      - name: Verify Containerfile build
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: ./Containerfile
          image: cert-manager-webhook-bunny-test
          tags: latest
          platforms: linux/amd64

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Run chart-testing lint
        run: ct lint --config .github/ct.yml
